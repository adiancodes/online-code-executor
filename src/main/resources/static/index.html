<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execute Your Code — Python Console</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #faf7f2; --divider: #e2ddd4; --brass: #8b7332;
    --teal: #1a8a74; --green: #2f9e5a; --red: #c44d52;
    --dark: #2c2a26; --dim: #8a847a; --out: #5a554e;
  }

  body { font-family: 'Outfit', sans-serif; background: var(--cream); color: #4a4640; min-height: 100vh; display: flex; flex-direction: column; }

  header { padding: 18px 30px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--divider); background: #fffdf9; }
  .brand { font-size: 20px; font-weight: 600; color: var(--dark); }
  .brand span { color: var(--brass); font-weight: 700; }
  .spacer { flex: 1; }
  .lang-badge { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--teal); background: rgba(26,138,116,0.08); border: 1px solid rgba(62,201,176,0.2); border-radius: 6px; padding: 4px 12px; }

  .wrap { flex: 1; display: flex; justify-content: center; padding: 24px; }
  .panel { width: 100%; max-width: 1060px; display: flex; background: #fff; border: 1px solid var(--divider); border-radius: 12px; box-shadow: 0 4px 20px rgba(60,50,30,0.07); overflow: hidden; }

  .side { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .side-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--brass); padding: 12px 20px 8px; }
  .divider { width: 1px; background: var(--divider); flex-shrink: 0; }

  #codeInput { flex: 1; width: 100%; min-height: 360px; background: transparent; color: var(--dark); border: none; outline: none; padding: 4px 20px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 14px; line-height: 1.75; resize: none; }
  #codeInput::placeholder { color: var(--dim); font-style: italic; }

  .out-side { background: rgba(0,0,0,0.02); }
  .out-header { padding: 12px 20px 8px; display: flex; align-items: center; justify-content: space-between; }
  .out-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--brass); }

  .pill { display: none; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 3px 10px 3px 8px; border-radius: 999px; }
  .pill.ready { display: inline-flex; color: var(--green); background: rgba(47,158,90,0.08); border: 1px solid rgba(47,158,90,0.2); }
  .pill.errored { display: inline-flex; color: var(--red); background: rgba(196,77,82,0.06); border: 1px solid rgba(196,77,82,0.15); }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill.ready .dot { animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

  #outputArea { flex: 1; padding: 4px 20px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.75; color: var(--out); white-space: pre-wrap; word-break: break-word; overflow-y: auto; min-height: 360px; }
  .ghost { color: var(--dim); font-family: 'Outfit', sans-serif; font-style: italic; font-size: 13px; }

  .toolbar { display: flex; justify-content: center; padding: 0 24px; }
  .toolbar-inner { width: 100%; max-width: 1060px; padding: 14px 0 0; display: flex; align-items: center; gap: 14px; }

  #runBtn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; background: linear-gradient(180deg, #3d3830, #2c2822); color: #f5f0e8; border: 1px solid rgba(139,115,50,0.3); border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform .15s, box-shadow .15s; box-shadow: 0 2px 8px rgba(40,30,10,0.2); }
  #runBtn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(40,30,10,0.25); }
  #runBtn:active:not(:disabled) { transform: none; }
  #runBtn:disabled { opacity: .45; cursor: not-allowed; }
  .icon { color: var(--brass); font-size: 11px; }
  #runBtn:hover .icon { color: var(--teal); }

  #status { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--dim); }
  #status.running { color: var(--brass); }
  #status.done { color: var(--teal); }
  #status.fail { color: var(--red); }

  .hint { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--dim); opacity: .6; }
  .hint kbd { background: #f0ece4; border: 1px solid var(--divider); border-radius: 3px; padding: 1px 5px; font-size: 10px; }

  .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(139,115,50,.2); border-top-color: var(--brass); border-radius: 50%; animation: revolve .65s linear infinite; vertical-align: middle; }
  @keyframes revolve { to { transform: rotate(360deg); } }

  footer { max-width: 1060px; width: 100%; margin: 16px auto 0; padding: 12px 24px 20px; display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); border-top: 1px solid var(--divider); }
  footer a { color: var(--brass); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 720px) {
    .panel { flex-direction: column; }
    .divider { width: auto; height: 1px; }
    .hint { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">execute <span>your code</span></div>
  <div class="spacer"></div>
  <span class="lang-badge">Python 3</span>
</header>

<div class="wrap">
  <div class="panel">
    <div class="side">
      <div class="side-label">Source</div>
      <textarea id="codeInput" spellcheck="false" placeholder="# write something and hit run...&#10;print('hello, world')"></textarea>
    </div>
    <div class="divider"></div>
    <div class="side out-side">
      <div class="out-header">
        <span class="out-label">Output</span>
        <span id="pill" class="pill"><span class="dot"></span><span id="pillText">READY.</span></span>
      </div>
      <div id="outputArea"><span class="ghost">Your output will appear here after you run your code.</span></div>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-inner">
    <button id="runBtn"><span class="icon">▶</span> Run Code</button>
    <span id="status"></span>
    <span class="hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd></span>
  </div>
</div>

<footer>
  <span>Made by <a href="https://github.com/adiancodes" target="_blank" rel="noopener">github.com/adiancodes</a></span>
  <span>© 2026</span>
</footer>

<script>
  const input = document.getElementById('codeInput');
  const btn   = document.getElementById('runBtn');
  const pill  = document.getElementById('pill');
  const pillText = document.getElementById('pillText');
  const status = document.getElementById('status');
  const out   = document.getElementById('outputArea');

  input.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = input.selectionStart;
      input.value = input.value.slice(0, s) + '    ' + input.value.slice(input.selectionEnd);
      input.selectionStart = input.selectionEnd = s + 4;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); btn.click(); }
  });

  btn.addEventListener('click', async () => {
    const code = input.value.trim();
    if (!code) { out.innerHTML = '<span class="ghost">Write some code first, then press Run.</span>'; return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Running…';
    status.textContent = 'executing…'; status.className = 'running';
    pill.className = 'pill';
    out.innerHTML = '<span class="ghost">⏳ Running…</span>';

    try {
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ problemId: 'playground', sourceCode: code, language: 'python' })
      });
      const data = await res.json();

      out[data.output?.length ? 'textContent' : 'innerHTML'] =
        data.output?.length ? data.output : '<span class="ghost">Program finished — no output produced.</span>';

      if (data.status === 'COMPLETED') {
        pill.className = 'pill ready'; pillText.textContent = 'READY.';
        status.textContent = 'done'; status.className = 'done';
      } else {
        pill.className = 'pill errored'; pillText.textContent = 'ERROR.';
        status.textContent = 'failed'; status.className = 'fail';
      }
    } catch (err) {
      out.textContent = 'Could not reach the server.\n' + err.message;
      pill.className = 'pill errored'; pillText.textContent = 'CONNECTION LOST.';
      status.textContent = 'error'; status.className = 'fail';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span class="icon">▶</span> Run Code';
    }
  });
</script>
</body>
</html>
